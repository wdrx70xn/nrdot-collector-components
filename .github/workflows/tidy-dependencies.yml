name: "Project: Tidy"
on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened, labeled, unlabeled]
    branches:
      - main

permissions:
  contents: read

env:
  # Make sure to exit early if cache segment download times out after 2 minutes.
  # We limit cache download as a whole to 5 minutes.
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 2

jobs:
  setup-environment:
    permissions:
      contents: write # required for pushing changes
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    # SECURITY: Use github.event.pull_request.user.login instead of github.actor to prevent actor impersonation attacks
    # See: https://www.synacktiv.com/publications/github-actions-exploitation-dependabot
    # Additionally, ensure the PR is not from a fork to prevent execution of untrusted code with repo secrets
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'dependency-major-update') && github.event.pull_request.head.repo.fork == false && (github.event.pull_request.user.login == 'renovate[bot]' || contains(github.event.pull_request.labels.*.name, 'renovatebot')) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # SECURITY: Use the immutable SHA rather than the mutable branch ref to prevent
          # TOCTOU attacks where the branch could be updated after the authorization check.
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6
        id: go-setup
        with:
          go-version: oldstable
          cache-dependency-path: "**/*.sum"
      - name: Install dependencies
        if: steps.go-setup.outputs.cache-hit != 'true'
        run: make -j2 gomoddownload
      - name: Install Tools
        if: steps.go-setup.outputs.cache-hit != 'true'
        run: make install-tools
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
      - name: go mod tidy, make gennrdotcol and make genoteltestbedcol
        run: |
          make gotidy && make gennrdotcol && make genoteltestbedcol
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git diff --exit-code || (git add . && git commit -m "go mod tidy, make gennrdotcol and make genoteltestbedcol" && git push origin "HEAD:$HEAD_REF")
        env:
          GITHUB_TOKEN: ${{ secrets.OTELCOMBOT_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}
      - uses: actions-ecosystem/action-remove-labels@2ce5d41b4b6aa8503e285553f75ed56e0a40bae0 # v1
        with:
          labels: renovatebot
