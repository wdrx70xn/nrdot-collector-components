# NOTE:
# This builder configuration is NOT used to build any official binary.
# Used only for testbed tests to validate nrdot components work with core collector.

dist:
  module: github.com/newrelic/nrdot-collector-components/cmd/oteltestbedcol
  name: oteltestbedcol
  description: OpenTelemetry Collector binary for testbed only tests.
  version: 0.148.0-dev
  output_path: ./cmd/oteltestbedcol

extensions:
  - gomod: go.opentelemetry.io/collector/extension/zpagesextension v0.150.1-0.20260417162938-7201768d04fb

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.150.1-0.20260417162938-7201768d04fb
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.150.1-0.20260417162938-7201768d04fb
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.150.1-0.20260417162938-7201768d04fb
  - gomod: github.com/newrelic/nrdot-collector-components/exporter/nopexporter v0.148.0

processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.150.1-0.20260417162938-7201768d04fb
  - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.150.1-0.20260417162938-7201768d04fb
  - gomod: github.com/newrelic/nrdot-collector-components/processor/adaptivetelemetryprocessor v0.148.0

receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.150.1-0.20260417162938-7201768d04fb
  - gomod: github.com/newrelic/nrdot-collector-components/receiver/nopreceiver v0.148.0

providers:
  - gomod: go.opentelemetry.io/collector/confmap/provider/envprovider v1.56.1-0.20260417162938-7201768d04fb
  - gomod: go.opentelemetry.io/collector/confmap/provider/fileprovider v1.56.1-0.20260417162938-7201768d04fb
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpprovider v1.56.1-0.20260417162938-7201768d04fb
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpsprovider v1.56.1-0.20260417162938-7201768d04fb
  - gomod: go.opentelemetry.io/collector/confmap/provider/yamlprovider v1.56.1-0.20260417162938-7201768d04fb

# When using `make genoteltestbedcol`, the `replaces` content is appended to this
# file before passing it to OCB, to ensure that local versions are used for all
# nrdot modules.
replaces:
